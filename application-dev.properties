# App Name
spring.application.name=currencyExchangeService

# H2 DB
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=jahnavi

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# IMPORTANT (Table name case fix)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.boot.admin.client.url=http://localhost:8081
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# SQL Execution
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true


# Micrometer Tracing for Zipkin
management.tracing.sampling.probability=1.0
management.tracing.export.zipkin.enabled=true
management.tracing.export.zipkin.endpoint=http://localhost:9411/api/v2/spans

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Enable Redis cache
spring.cache.type=redis

# TTL (optional if config class used)
spring.cache.redis.time-to-live=60000
